services:
  service:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HTTP_PORT:-8787}:${HTTP_PORT:-8787}"  # loopback-only: called by local Homebridge plugin
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:${HTTP_PORT:-8787}/', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
